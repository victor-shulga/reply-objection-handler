name: ci

on:
  push:
    branches: [main, "**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate plugin structure
        run: bash scripts/validate.sh
      - name: Lint shell scripts (bash -n)
        run: bash -n scripts/validate.sh
